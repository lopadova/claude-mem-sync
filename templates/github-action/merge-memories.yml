name: Merge Developer Memories
on:
  push:
    paths:
      - 'contributions/**/*.json'
  workflow_dispatch:

concurrency:
  group: merge-memories
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Configure GitHub Packages registry
        run: |
          echo "@lopadova:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc

      - name: Install claude-mem-sync
        run: bun install -g @lopadova/claude-mem-sync

      - name: Merge new contributions
        run: |
          mem-sync ci-merge \
            --contributions-dir contributions/ \
            --output-dir merged/ \
            --state-file .merge-state.json \
            --cap 500 \
            --retention-days 30

      - name: Generate developer profiles
        env:
          GH_REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import os, json, glob
          repo = os.environ['GH_REPO']
          projects = {}
          for path in sorted(glob.glob('merged/*/latest.json')):
              proj = path.split('/')[1]
              projects[proj] = {'enabled': True, 'remote': {'repo': repo}}
          config = {
              'global': {'devName': 'ci-bot', 'profiles': {'enabled': True, 'anonymizeOthers': False}},
              'projects': projects,
          }
          os.makedirs(os.path.expanduser('~/.claude-mem-sync'), exist_ok=True)
          with open(os.path.expanduser('~/.claude-mem-sync/config.json'), 'w') as f:
              json.dump(config, f, indent=2)
          print('Config created for projects:', list(projects.keys()))
          PYEOF
          mem-sync profile \
            --all \
            --contributions-dir contributions/ \
            --output-dir merged/
        continue-on-error: true

      - name: Commit merged memories and profiles
        run: |
          git config user.name "mem-sync-bot"
          git config user.email "mem-sync-bot@users.noreply.github.com"
          git add merged/ profiles/ .merge-state.json contributions/
          git diff --cached --quiet || git commit -m "chore: merge developer memories [mem-sync]"
          git pull --rebase
          git push
