name: Merge Developer Memories
on:
  push:
    paths:
      - 'contributions/**/*.json'
  workflow_dispatch:

concurrency:
  group: merge-memories
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Merge new contributions
        run: |
          node dist/cli.js ci-merge \
            --contributions-dir contributions/ \
            --output-dir merged/ \
            --state-file .merge-state.json \
            --cap 500 \
            --retention-days 30

      - name: Setup config for profile generation
        run: |
          python3 -c "
          import os, json, glob as g
          projects = {}
          for path in g.glob('merged/*/latest.json'):
              proj = path.split('/')[1]
              projects[proj] = {'enabled': True, 'remote': {'repo': os.environ.get('GITHUB_REPOSITORY', 'lopadova/claude-mem-sync')}}
          config = {
              'global': {
                  'devName': 'ci-bot',
                  'profiles': {'enabled': True, 'anonymizeOthers': False},
              },
              'projects': projects,
          }
          os.makedirs(os.path.expanduser('~/.claude-mem-sync'), exist_ok=True)
          with open(os.path.expanduser('~/.claude-mem-sync/config.json'), 'w') as f:
              json.dump(config, f, indent=2)
          print('Config written with', len(projects), 'project(s):', list(projects.keys()))
          "

      - name: Generate developer profiles
        run: |
          node dist/cli.js profile \
            --all \
            --contributions-dir contributions/ \
            --output-dir merged/
        continue-on-error: true

      - name: Commit merged memories and profiles
        run: |
          git config user.name "mem-sync-bot"
          git config user.email "mem-sync-bot@users.noreply.github.com"
          git add merged/ profiles/ .merge-state.json contributions/
          git diff --cached --quiet || git commit -m "chore: merge developer memories [mem-sync]"
          git pull --rebase
          git push
